<style>
/* ── Real brand fonts, wired to the local files in fonts/ ─────────────── */
@font-face { font-family:'AestrLogo';   src:url('fonts/logo-sans.ttf') format('truetype');  font-weight:200 400; font-display:swap; }
@font-face { font-family:'AestrSerif';  src:url('fonts/serif-cn.ttf')  format('truetype');  font-weight:200 700; font-display:swap; }
@font-face { font-family:'AestrFengYa'; src:url('fonts/fengya-cn.ttf') format('truetype');  font-weight:400;     font-display:swap; }
/* 'AestrScript' (slogan) is defined in fonts/aestr-script.css — embedded so it works on mobile too */

/* ── Page-local roles built on the brand stacks ──────────────────────── */
:root{
  --logo:    'AestrLogo','Montserrat Alternates','Helvetica Neue',sans-serif;
  --serif:   'AestrSerif','Noto Serif SC','Songti SC',serif;
  --sans:    var(--font-body);
  --mono:    var(--font-number);          /* Special Elite — numerals/stamps */
  --script:  'AestrScript',cursive;
  --fengya:  'AestrFengYa',var(--serif);
  --gutter:  clamp(24px,7vw,120px);
}

*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  background:var(--c-paper);
  color:var(--c-ink-2);
  font-family:var(--sans);
  font-size:var(--type-body);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100svh; display:flex; flex-direction:column;
}
::selection{ background:var(--c-oxblood); color:var(--c-bone); }
a{ color:inherit; text-decoration:none; border:0; }
img{ display:block; max-width:100%; }

/* Shared editorial primitives ─────────────────────────────────────────── */
.eyebrow{
  font-family:var(--mono); font-size:var(--type-stamp);
  letter-spacing:.22em; text-transform:uppercase; color:var(--c-ink-3);
}
.num{ font-family:var(--mono); font-variant-numeric:tabular-nums; }

/* ── Nav (same component as the homepage) ─────────────────────────────── */
.nav{
  position:fixed; inset:0 0 auto 0; z-index:100; height:62px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--gutter);
  background:rgba(224,214,202,0); border-bottom:1px solid transparent;
  transition:background var(--t-base) var(--ease-quiet), border-color var(--t-base) var(--ease-quiet);
}
.nav.scrolled{
  background:rgba(224,214,202,.82);
  backdrop-filter:blur(14px) saturate(1.05); -webkit-backdrop-filter:blur(14px) saturate(1.05);
  border-bottom-color:var(--c-hairline);
}
.nav-brand{ display:flex; align-items:center; opacity:1; transition:opacity var(--t-base) var(--ease-quiet); }
/* AESTRAT Consulting lockup: one image (incl. 研美咨询), recoloured via CSS mask so it reads on both nav states */
.nav-brand .nav-logo{
  display:block; width:116px; height:46px;
  background-color:var(--c-bone);
  -webkit-mask:url('assets/aestrat-wordmark-on-light.png') left center/contain no-repeat;
          mask:url('assets/aestrat-wordmark-on-light.png') left center/contain no-repeat;
  transition:background-color var(--t-base) var(--ease-quiet);
}
.nav-links{ display:flex; align-items:center; gap:clamp(18px,2.4vw,34px); }
.nav-links a{
  font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--c-slate-4); transition:color var(--t-fast) var(--ease-quiet);
}
.nav-links a.here{ color:var(--c-sand-2); }
.nav-links a:hover{ color:var(--c-sand-2); }
.lang-toggle{ background:none; border:0; cursor:pointer; font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--c-sand-2); padding:4px 0 4px clamp(12px,1.8vw,26px); transition:color var(--t-fast) var(--ease-quiet); }
.lang-toggle:hover{ color:var(--c-bone); }
.nav.scrolled .lang-toggle{ color:var(--c-oxblood); }
.nav.scrolled .nav-brand .nav-logo{ background-color:var(--c-slate); }
.nav.scrolled .nav-links a{ color:var(--c-ink-3); }
.nav.scrolled .nav-links a.here{ color:var(--c-oxblood); }
.nav.scrolled .nav-links a:hover{ color:var(--c-oxblood); }
@media(max-width:780px){ .nav-links a.hide-sm{ display:none; } }

/* ── Blog masthead + empty state (dusk register) ──────────────────────── */
.blog{
  position:relative; flex:1;
  background:var(--c-slate); color:var(--c-bone); overflow:hidden;
  display:flex; flex-direction:column; justify-content:center;
  padding:clamp(150px,18vw,210px) var(--gutter) clamp(80px,12vw,140px);
}
.blog::before{
  content:''; position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.5;
  background-image:radial-gradient(var(--c-slate-3) 1px, transparent 1px);
  background-size:34px 34px;
  -webkit-mask-image:radial-gradient(ellipse 78% 70% at 50% 38%, #000 0%, transparent 72%);
          mask-image:radial-gradient(ellipse 78% 70% at 50% 38%, #000 0%, transparent 72%);
}
.blog-inner{ position:relative; z-index:1; max-width:760px; margin:0 auto; text-align:center; }
.blog .eyebrow{ color:var(--c-sand-2); margin-bottom:24px; }
.blog-title{
  font-family:var(--serif); font-weight:200; font-size:clamp(34px,5vw,60px); line-height:1.1;
  letter-spacing:.01em; color:var(--c-bone);
}
.blog-title .cn{ display:block; font-family:var(--fengya); font-size:.4em; letter-spacing:.32em; color:var(--c-sand-2); margin-top:18px; padding-left:.32em; }
/* Aesthetic Reflections lockup — light PNG so it renders everywhere (incl. file://) */
.blog-logo{ display:block; margin:0 auto; width:min(320px,78%); height:auto; }
.blog-slogan{ margin-top:clamp(30px,4vw,48px); }
.blog-slogan .en{ display:block; font-family:var(--script); font-weight:400; font-size:clamp(32px,5vw,56px); color:var(--c-bone); line-height:1.05; }
.blog-slogan .cn{ display:block; font-family:var(--fengya); font-weight:400; font-size:clamp(28px,4vw,46px);
  letter-spacing:.3em; color:var(--c-sand-2); margin-top:clamp(22px,2.6vw,34px); padding-left:.3em; }
.blog-lead{
  margin:clamp(26px,3.4vw,40px) auto 0; max-width:52ch;
  font-size:16px; line-height:1.95; color:var(--c-sand-2); font-weight:300;
}
.blog-status{
  min-height:clamp(420px,56vh,780px);
  display:flex; justify-content:center; align-items:center; gap:12px; margin-top:clamp(28px,4vw,44px);
  font-family:var(--mono); font-size:10.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--c-slate-4);
}
.blog-status::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--c-sand-1); animation:blogpulse 2.6s var(--ease-quiet) infinite; }
@keyframes blogpulse{ 0%,100%{ opacity:.35; transform:scale(1); } 50%{ opacity:1; transform:scale(1.5); } }
.blog-channels{
  margin-top:clamp(30px,4vw,44px); display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
}
.blog-ic{
  display:inline-flex; align-items:center; justify-content:center; padding:9px; color:var(--c-sand-2);
  transition:color var(--t-base) var(--ease-quiet), transform var(--t-base) var(--ease-quiet);
}
.blog-ic:hover{ color:var(--c-sand-3); transform:translateY(-2px); }
.blog-ic svg{ width:27px; height:27px; fill:currentColor; display:block; }
.blog-ic .oa{ display:block; width:28px; height:28px; background-color:currentColor;
  -webkit-mask:url('assets/wechat-oa.png') center/contain no-repeat;
          mask:url('assets/wechat-oa.png') center/contain no-repeat; }

/* ── Footer (same component as the homepage) ──────────────────────────── */
.footer{ background:var(--c-slate-1); color:var(--c-paper-light); padding:clamp(48px,6vw,72px) var(--gutter) clamp(28px,4vw,40px); }
.footer-top{ display:flex; flex-wrap:wrap; align-items:center; gap:30px 72px; max-width:1180px; margin:0 auto; }
.f-qr{ display:flex; flex-direction:column; gap:9px; align-items:center; flex:none; }
.f-qr img{ width:118px; height:118px; display:block; }
.f-qr .cap{ font-family:var(--mono); font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--c-slate-4); }
.f-connect{ flex:1; min-width:240px; }
.footer-top .f-channels{ display:flex; flex-wrap:wrap; gap:16px 38px; }
.footer-top .f-channels li{ margin:0; }
.footer-top .f-chan{ display:inline-flex; align-items:center; gap:9px; color:var(--c-sand-2); font-size:13px; transition:color var(--t-fast) var(--ease-quiet); }
.footer-top .f-chan svg{ width:16px; height:16px; fill:currentColor; flex:none; opacity:.92; }
.footer-top a.f-chan:hover{ color:var(--c-bone); }
.footer h4{ font-family:var(--mono); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--c-slate-4); margin-bottom:18px; font-weight:400; }
.footer .f-brand{ font-family:var(--logo); font-weight:300; letter-spacing:.3em; text-transform:uppercase; font-size:17px; color:var(--c-bone); }
.footer .f-brand-cn{ font-family:var(--serif); font-size:13px; letter-spacing:.14em; color:var(--c-slate-4); margin-top:10px; }
.footer .f-slogan{ font-family:var(--script); font-size:21px; color:var(--c-sand-2); margin-top:20px; }
.footer ul{ list-style:none; }
.footer li{ margin-bottom:11px; font-size:13px; }
.footer li a, .footer li span{ color:var(--c-paper-light); transition:color var(--t-fast) var(--ease-quiet); }
.footer li a:hover{ color:var(--c-sand-2); }
.footer .k{ font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--c-slate-4); display:block; }
.footer-bottom{ max-width:1180px; margin:clamp(36px,5vw,56px) auto 0; padding-top:22px; border-top:1px solid rgba(224,214,202,.12);
  display:flex; justify-content:space-between; gap:18px; flex-wrap:wrap; }
.footer-bottom span{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; color:var(--c-slate-4); }
@media(max-width:760px){ .footer-top{ grid-template-columns:1fr; gap:30px; } }

</style>
</head>

<script>
(function(){var KEY="aestrat-lang",root=document.documentElement;var I18N={"nav.home": "首页", "nav.services": "服务", "nav.blog": "洞察", "nav.contact": "联系", "blog.soon": "即将上线", "blog.wechat": "公众号 · 研美思维", "f.connect": "联系我们", "f.loc": "中国 · 上海", "f.copy": "© 2026 AESTRAT Consulting 研美咨询 · 保留所有权利。"};

function apply(lang){root.setAttribute("data-lang",lang);nodes.forEach(function(n,i){var z=I18N[n.getAttribute("data-i18n")];n.innerHTML=(lang==="zh"&&z!=null)?z:en[i];});try{localStorage.setItem(KEY,lang);}catch(e){}[].forEach.call(document.querySelectorAll(".lang-toggle"),function(b){b.textContent=lang==="zh"?"EN":"中文";});}
