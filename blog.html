<!-- Foundation tokens (five brand colors, type scale, spacing) -->

<style>
/* ── Real brand fonts, wired to the local files in fonts/ ─────────────── */
@font-face { font-family:'AestrLogo';   src:url('fonts/logo-sans.ttf') format('truetype');  font-weight:200 400; font-display:swap; }
@font-face { font-family:'AestrSerif';  src:url('fonts/serif-cn.ttf')  format('truetype');  font-weight:200 700; font-display:swap; }
@font-face { font-family:'AestrFengYa'; src:url('fonts/fengya-cn.ttf') format('truetype');  font-weight:400;     font-display:swap; }
/* 'AestrScript' (slogan) is defined in fonts/aestr-script.css — embedded so it works on mobile too */

/* ── Page-local roles built on the brand stacks ──────────────────────── */
:root{
  --logo:    'AestrLogo','Montserrat Alternates','Helvetica Neue',sans-serif;
  --serif:   'AestrSerif','Noto Serif SC','Songti SC',serif;
  --sans:    var(--font-body);
  --mono:    var(--font-number);          /* Special Elite — numerals/stamps */
  --script:  'AestrScript',cursive;
  --fengya:  'AestrFengYa',var(--serif);
  --gutter:  clamp(24px,7vw,120px);
}

*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  background:var(--c-paper);
  color:var(--c-ink-2);
  font-family:var(--sans);
  font-size:var(--type-body);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100svh; display:flex; flex-direction:column;
}
::selection{ background:var(--c-oxblood); color:var(--c-bone); }
a{ color:inherit; text-decoration:none; border:0; }
img{ display:block; max-width:100%; }

/* Shared editorial primitives ─────────────────────────────────────────── */
.eyebrow{
  font-family:var(--mono); font-size:var(--type-stamp);
  letter-spacing:.22em; text-transform:uppercase; color:var(--c-ink-3);
}
.num{ font-family:var(--mono); font-variant-numeric:tabular-nums; }

/* ── Nav (same component as the homepage) ─────────────────────────────── */
.nav{
  position:fixed; inset:0 0 auto 0; z-index:100; height:62px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--gutter);
  background:rgba(224,214,202,0); border-bottom:1px solid transparent;
  transition:background var(--t-base) var(--ease-quiet), border-color var(--t-base) var(--ease-quiet);
}
.nav.scrolled{
  background:rgba(224,214,202,.82);
  backdrop-filter:blur(14px) saturate(1.05); -webkit-backdrop-filter:blur(14px) saturate(1.05);
  border-bottom-color:var(--c-hairline);
}
.nav-brand{ display:flex; align-items:center; opacity:1; transition:opacity var(--t-base) var(--ease-quiet); }
/* AESTRAT Consulting lockup: one image (incl. 研美咨询), recoloured via CSS mask so it reads on both nav states */
.nav-brand .nav-logo{
  display:block; width:116px; height:46px;
  background-color:var(--c-bone);
  -webkit-mask:url('assets/aestrat-wordmark-on-light.png') left center/contain no-repeat;
          mask:url('assets/aestrat-wordmark-on-light.png') left center/contain no-repeat;
  transition:background-color var(--t-base) var(--ease-quiet);
}
.nav-links{ display:flex; align-items:center; gap:clamp(18px,2.4vw,34px); }
.nav-links a{
  font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--c-slate-4); transition:color var(--t-fast) var(--ease-quiet);
}
.nav-links a.here{ color:var(--c-sand-2); }
.nav-links a:hover{ color:var(--c-sand-2); }
.lang-toggle{ background:none; border:0; cursor:pointer; font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--c-sand-2); padding:4px 0 4px clamp(12px,1.8vw,26px); transition:color var(--t-fast) var(--ease-quiet); }
.lang-toggle:hover{ color:var(--c-bone); }
.nav.scrolled .lang-toggle{ color:var(--c-oxblood); }
.nav.scrolled .nav-brand .nav-logo{ background-color:var(--c-slate); }
.nav.scrolled .nav-links a{ color:var(--c-ink-3); }
.nav.scrolled .nav-links a.here{ color:var(--c-oxblood); }
.nav.scrolled .nav-links a:hover{ color:var(--c-oxblood); }
@media(max-width:780px){ .nav-links a.hide-sm{ display:none; } }

/* ── Blog masthead + empty state (dusk register) ──────────────────────── */
.blog{
  position:relative; flex:1;
  background:var(--c-slate); color:var(--c-bone); overflow:hidden;
  display:flex; flex-direction:column; justify-content:center;
  padding:clamp(150px,18vw,210px) var(--gutter) clamp(80px,12vw,140px);
}
.blog::before{
  content:''; position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.5;
  background-image:radial-gradient(var(--c-slate-3) 1px, transparent 1px);
  background-size:34px 34px;
  -webkit-mask-image:radial-gradient(ellipse 78% 70% at 50% 38%, #000 0%, transparent 72%);
          mask-image:radial-gradient(ellipse 78% 70% at 50% 38%, #000 0%, transparent 72%);
}
.blog-inner{ position:relative; z-index:1; max-width:760px; margin:0 auto; text-align:center; }
.blog .eyebrow{ color:var(--c-sand-2); margin-bottom:24px; }
.blog-title{
  font-family:var(--serif); font-weight:200; font-size:clamp(34px,5vw,60px); line-height:1.1;
  letter-spacing:.01em; color:var(--c-bone);
}
.blog-title .cn{ display:block; font-family:var(--fengya); font-size:.4em; letter-spacing:.32em; color:var(--c-sand-2); margin-top:18px; padding-left:.32em; }
/* Aesthetic Reflections lockup — light PNG so it renders everywhere (incl. file://) */
.blog-logo{ display:block; margin:0 auto; width:min(320px,78%); height:auto; }
.blog-slogan{ margin-top:clamp(30px,4vw,48px); }
.blog-slogan .en{ display:block; font-family:var(--script); font-weight:400; font-size:clamp(32px,5vw,56px); color:var(--c-bone); line-height:1.05; }
.blog-slogan .cn{ display:block; font-family:var(--fengya); font-weight:400; font-size:clamp(28px,4vw,46px);
  letter-spacing:.3em; color:var(--c-sand-2); margin-top:clamp(22px,2.6vw,34px); padding-left:.3em; }
.blog-lead{
  margin:clamp(26px,3.4vw,40px) auto 0; max-width:52ch;
  font-size:16px; line-height:1.95; color:var(--c-sand-2); font-weight:300;
}
.blog-status{
  display:flex; justify-content:center; align-items:center; gap:12px; margin-top:clamp(34px,5vw,52px);
  font-family:var(--mono); font-size:10.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--c-slate-4);
}
.blog-status::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--c-sand-1); animation:blogpulse 2.6s var(--ease-quiet) infinite; }
@keyframes blogpulse{ 0%,100%{ opacity:.35; transform:scale(1); } 50%{ opacity:1; transform:scale(1.5); } }
.blog-channels{
  margin-top:clamp(30px,4vw,44px); display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
}
.blog-chip{
  font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase;
  padding:11px 22px; border:1px solid rgba(224,214,202,.22); color:var(--c-bone);
  transition:border-color var(--t-base) var(--ease-quiet), color var(--t-base) var(--ease-quiet);
}
.blog-chip:hover{ border-color:var(--c-sand-1); color:var(--c-sand-2); }

/* ── Footer (same component as the homepage) ──────────────────────────── */
.footer{ background:var(--c-slate-1); color:var(--c-paper-light); padding:clamp(48px,6vw,72px) var(--gutter) clamp(28px,4vw,40px); }
.footer-top{ display:flex; flex-wrap:wrap; align-items:center; gap:30px 72px; max-width:1180px; margin:0 auto; }
.f-qr{ display:flex; flex-direction:column; gap:9px; align-items:center; flex:none; }
.f-qr img{ width:118px; height:118px; display:block; }
.f-qr .cap{ font-family:var(--mono); font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--c-slate-4); }
.f-connect{ flex:1; min-width:240px; }
.footer-top .f-channels{ display:flex; flex-wrap:wrap; gap:16px 38px; }
.footer-top .f-channels li{ margin:0; }
.footer-top .f-chan{ display:inline-flex; align-items:center; gap:9px; color:var(--c-sand-2); font-size:13px; transition:color var(--t-fast) var(--ease-quiet); }
.footer-top .f-chan svg{ width:16px; height:16px; fill:currentColor; flex:none; opacity:.92; }
.footer-top a.f-chan:hover{ color:var(--c-bone); }
.footer h4{ font-family:var(--mono); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--c-slate-4); margin-bottom:18px; font-weight:400; }
.footer .f-brand{ font-family:var(--logo); font-weight:300; letter-spacing:.3em; text-transform:uppercase; font-size:17px; color:var(--c-bone); }
.footer .f-brand-cn{ font-family:var(--serif); font-size:13px; letter-spacing:.14em; color:var(--c-slate-4); margin-top:10px; }
.footer .f-slogan{ font-family:var(--script); font-size:21px; color:var(--c-sand-2); margin-top:20px; }
.footer ul{ list-style:none; }
.footer li{ margin-bottom:11px; font-size:13px; }
.footer li a, .footer li span{ color:var(--c-paper-light); transition:color var(--t-fast) var(--ease-quiet); }
.footer li a:hover{ color:var(--c-sand-2); }
.footer .k{ font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--c-slate-4); display:block; }
.footer-bottom{ max-width:1180px; margin:clamp(36px,5vw,56px) auto 0; padding-top:22px; border-top:1px solid rgba(224,214,202,.12);
  display:flex; justify-content:space-between; gap:18px; flex-wrap:wrap; }
.footer-bottom span{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; color:var(--c-slate-4); }
@media(max-width:760px){ .footer-top{ grid-template-columns:1fr; gap:30px; } }

/* ── AI assistant (UI shell — wire .endpoint to a DeepSeek serverless proxy to go live) ── */
.chat-fab{
  position:fixed; right:clamp(18px,3vw,32px); bottom:clamp(18px,3vw,32px); z-index:200;
  width:58px; height:58px; border-radius:50%; border:0; cursor:pointer;
  background:var(--c-oxblood); color:var(--c-bone);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 14px 32px -10px rgba(10,16,26,.6);
  transition:transform var(--t-base) var(--ease-quiet), background var(--t-base) var(--ease-quiet);
}
.chat-fab:hover{ transform:translateY(-2px); background:var(--c-oxblood-2); }
.chat-fab svg{ width:26px; height:26px; fill:currentColor; }
.chat-fab .dot{ position:absolute; top:13px; right:13px; width:9px; height:9px; border-radius:50%; background:var(--c-sand-2); border:2px solid var(--c-oxblood); }
.chat-fab.open{ background:var(--c-slate); }
.chat-panel{
  position:fixed; right:clamp(18px,3vw,32px); bottom:calc(clamp(18px,3vw,32px) + 70px); z-index:200;
  width:min(380px, calc(100vw - 36px)); height:min(560px, calc(100vh - 130px));
  display:flex; flex-direction:column; overflow:hidden;
  background:var(--c-paper); border:1px solid var(--c-sand-1); border-radius:16px;
  box-shadow:0 30px 70px -24px rgba(10,16,26,.65);
  opacity:0; transform:translateY(12px) scale(.98); pointer-events:none;
  transition:opacity var(--t-base) var(--ease-quiet), transform var(--t-base) var(--ease-quiet);
}
.chat-panel.open{ opacity:1; transform:none; pointer-events:auto; }
.chat-head{ display:flex; align-items:center; gap:11px; padding:16px 18px; background:var(--c-slate); color:var(--c-bone); }
.chat-head img{ width:30px; height:30px; flex:none; }
.chat-head .t{ flex:1; }
.chat-head .t b{ font-family:var(--serif); font-weight:300; font-size:15px; letter-spacing:.02em; display:block; }
.chat-head .t span{ font-family:var(--mono); font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--c-sand-2); }
.chat-head .x{ background:none; border:0; color:var(--c-slate-4); cursor:pointer; font-size:22px; line-height:1; padding:2px 6px; transition:color var(--t-fast); }
.chat-head .x:hover{ color:var(--c-bone); }
.chat-body{ flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
.chat-msg{ max-width:84%; font-size:13.5px; line-height:1.65; padding:11px 14px; border-radius:14px; white-space:pre-line; }
.chat-msg.bot{ align-self:flex-start; background:var(--c-paper-light); color:var(--c-ink-2); border:1px solid var(--c-hairline); border-bottom-left-radius:4px; }
.chat-msg.me{ align-self:flex-end; background:var(--c-slate); color:var(--c-bone); border-bottom-right-radius:4px; }
.chat-chips{ display:flex; flex-wrap:wrap; gap:8px; padding:0 18px 12px; }
.chat-chip{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; color:var(--c-oxblood);
  background:none; border:1px solid var(--c-border); border-radius:999px; padding:7px 13px; cursor:pointer;
  transition:background var(--t-fast), color var(--t-fast), border-color var(--t-fast); }
.chat-chip:hover{ background:var(--c-oxblood); color:var(--c-bone); border-color:var(--c-oxblood); }
.chat-input{ display:flex; gap:8px; padding:12px; border-top:1px solid var(--c-hairline); background:var(--c-paper-light); }
.chat-input input{ flex:1; border:1px solid var(--c-border); border-radius:999px; padding:10px 16px; font-family:var(--sans); font-size:13px; color:var(--c-ink-2); background:var(--c-paper); outline:none; }
.chat-input input:focus{ border-color:var(--c-sand-1); }
.chat-input button{ flex:none; width:40px; height:40px; border-radius:50%; border:0; background:var(--c-oxblood); color:var(--c-bone); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background var(--t-fast); }
.chat-input button:hover{ background:var(--c-oxblood-2); }
.chat-input button svg{ width:17px; height:17px; fill:currentColor; }
@media(max-width:480px){ .chat-panel{ height:min(72vh, 540px); } }
</style>
</head>

const nav = document.getElementById('nav');
const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 40);
onScroll(); window.addEventListener('scroll', onScroll, { passive:true });
</script>
<!-- ── AI assistant widget (UI shell; connect a DeepSeek serverless proxy later) ── -->
<button class="chat-fab" id="chatFab" aria-label="Chat with AESTRAT">
  <span class="dot"></span>
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2z"/></svg>

<section class="chat-panel" id="chatPanel" aria-live="polite">
  <div class="chat-head">
    <img src="assets/ip-brain-mark.png" alt="">
    <div class="t"><b>AESTRAT Assistant</b><span>研美 · AI</span></div>

<script>
(function(){
  // Endpoint is the same-origin Cloudflare Pages Function (functions/api/chat.js) that hides the
  // DeepSeek key. It only exists on the Pages deployment; on file:// or GitHub Pages the fetch
  // fails and the widget gracefully falls back to the canned/placeholder answers below.
  const AESTRAT_CHAT = { endpoint: '/api/chat' };

  const fab=document.getElementById('chatFab'), panel=document.getElementById('chatPanel'),
        body=document.getElementById('chatBody'), chips=document.getElementById('chatChips'),
        form=document.getElementById('chatForm'), text=document.getElementById('chatText'),
        closeBtn=document.getElementById('chatClose');

  const CANNED=[
    {q:'Who is AESTRAT?',
     a:"AESTRAT Consulting (研美咨询) is a boutique strategic advisory — the bridge between global medical-aesthetics brands and China. From insight to impact."},
    {q:'What do you do?',
     a:"Three ways across the bridge:\n· China Market Entry — for global brands entering China\n· Sourcing & Partnership — for buyers seeking Chinese products\n· Market Intelligence — proprietary data on the sector"},
    {q:'How can I reach you?',
     a:"By email at contact@aestrat.co, on LinkedIn, or on WeChat (ID: YanMeiChat — or scan the QR in the footer)."},
    {q:'I’d like to introduce myself',
     a:"Wonderful — tell me your name, your company, and what you’re looking for, and I’ll make sure it reaches the right person."}
  ];

  const FALLBACK="Thanks! Our live AI assistant is being connected — soon I’ll answer this in any language, in real time. Meanwhile, reach us at contact@aestrat.co or via WeChat (QR in the footer).";
  let started=false, history=[];
  function add(role,msg){ const d=document.createElement('div'); d.className='chat-msg '+role; if(msg!=null) d.textContent=msg; body.appendChild(d); body.scrollTop=body.scrollHeight; return d; }
  async function reply(userMsg,canned){
    history.push({role:'user',content:userMsg});
    const el=add('bot','…');
    let acc='';
    try{
      if(!AESTRAT_CHAT.endpoint) throw 0;
      const res=await fetch(AESTRAT_CHAT.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:userMsg,history:history.slice(0,-1)})});
      if(!res.ok||!res.body) throw 0;
      el.textContent='';
      const rd=res.body.getReader(), dec=new TextDecoder();
      for(;;){ const {done,value}=await rd.read(); if(done) break; acc+=dec.decode(value,{stream:true}); el.textContent=acc; body.scrollTop=body.scrollHeight; }
      if(!acc.trim()) throw 0;
    }catch(e){
      acc=canned||FALLBACK; el.textContent=acc;
    }
    history.push({role:'assistant',content:acc});
  }
  function start(){
    if(started) return; started=true;
    add('bot',"Hi 👋 I’m AESTRAT’s assistant. Ask me who we are, what we do, or how to connect — in any language. 你好，可以用任何语言和我聊。");
    CANNED.forEach(c=>{ const b=document.createElement('button'); b.className='chat-chip'; b.type='button'; b.textContent=c.q; b.onclick=()=>{ add('me',c.q); reply(c.q,c.a); }; chips.appendChild(b); });
  }
  function open(){ panel.classList.add('open'); fab.classList.add('open'); start(); setTimeout(()=>text.focus(),300); }
  function close(){ panel.classList.remove('open'); fab.classList.remove('open'); }
  fab.onclick=()=> panel.classList.contains('open')?close():open();
  closeBtn.onclick=close;
  form.addEventListener('submit',e=>{ e.preventDefault(); const v=text.value.trim(); if(!v) return; add('me',v); text.value=''; reply(v); });
})();
</script>

<script>
(function(){var KEY="aestrat-lang",root=document.documentElement;var I18N={"nav.home": "首页", "nav.services": "服务", "nav.blog": "洞察", "nav.contact": "联系", "blog.soon": "即将上线", "blog.wechat": "公众号 · 研美思维", "f.connect": "联系我们", "f.loc": "中国 · 上海", "f.copy": "© 2026 AESTRAT Consulting 研美咨询 · 保留所有权利。"};
var nodes=[].slice.call(document.querySelectorAll("[data-i18n]"));var en=nodes.map(function(n){return n.innerHTML;});
function apply(lang){root.setAttribute("data-lang",lang);nodes.forEach(function(n,i){var z=I18N[n.getAttribute("data-i18n")];n.innerHTML=(lang==="zh"&&z!=null)?z:en[i];});try{localStorage.setItem(KEY,lang);}catch(e){}[].forEach.call(document.querySelectorAll(".lang-toggle"),function(b){b.textContent=lang==="zh"?"EN":"中文";});}
var saved="en";try{saved=localStorage.getItem(KEY)||"en";}catch(e){}apply(saved);
document.addEventListener("click",function(e){var t=e.target.closest&&e.target.closest(".lang-toggle");if(t){e.preventDefault();apply(root.getAttribute("data-lang")==="zh"?"en":"zh");}});
})();
</script>
</body>
</html>
